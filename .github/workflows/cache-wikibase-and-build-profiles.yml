name: Cache Wikibase and Build Profiles

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or tag to refresh and commit into
        required: false
        type: string
        default: main
      api_url:
        description: Optional Wikibase API URL override
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  refresh-cache-and-build-profiles:
    name: Cache Wikibase and Build Profiles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SpiritSafe target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gkc CLI
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/skybristol/gkc.git@main"

      - name: Refresh entity cache from recentchanges
        env:
          INPUT_API_URL: ${{ inputs.api_url }}
        run: |
          mkdir -p cache/refresh
          if [ -n "$INPUT_API_URL" ]; then
            gkc wikibase check-for-revisions \
              --api-url "$INPUT_API_URL" \
              --cache-dir cache/entities \
              --ignore-id Q1 \
              --ignore-id P1 \
              --ignore-id P2 \
              --output cache/refresh/last_run_summary.json
          else
            gkc wikibase check-for-revisions \
              --cache-dir cache/entities \
              --ignore-id Q1 \
              --ignore-id P1 \
              --ignore-id P2 \
              --output cache/refresh/last_run_summary.json
          fi

      - name: Export JSON profiles from refreshed cache
        run: |
          mkdir -p profiles
          gkc --json profile export-json \
            --cache-entities-dir cache/entities \
            --summary-output cache/refresh/last_run_summary.json \
            --output profiles

      - name: Build cache manifest and entity index
        run: |
          mkdir -p cache
          gkc --json spiritsafe manifest build --source local --local-root .

      - name: Commit and push cache and profile updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/entities cache/refresh/last_run_summary.json profiles cache/manifest.json cache/entity_index.json
          if git diff --cached --quiet; then
            echo "No cache, profile, manifest, or entity index changes to commit"
          else
            git commit -m "chore: refresh Wikibase cache and export profiles [skip ci]"
            git push origin "HEAD:${{ inputs.target_ref }}"
          fi
