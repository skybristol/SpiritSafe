name: Cache Wikibase and Build Profiles

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or tag to refresh and commit into
        required: false
        type: string
        default: main
      api_url:
        description: Optional Wikibase API URL override
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  refresh-cache-and-build-profiles:
    name: Cache Wikibase and Build Profiles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SpiritSafe target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gkc CLI
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          pip install "git+https://github.com/skybristol/gkc.git@main"

      - name: Resolve SpiritSafe layout paths
        run: python .github/scripts/load_spiritsafe_layout.py >> "$GITHUB_ENV"

      - name: Refresh entity cache from recentchanges
        env:
          INPUT_API_URL: ${{ inputs.api_url }}
        run: |
          mkdir -p "$SPIRITSAFE_ENTITIES_PATH" "$SPIRITSAFE_LOGS_PATH"
          if [ -n "$INPUT_API_URL" ]; then
            gkc mash cache-wikibase-revisions \
              --api-url "$INPUT_API_URL" \
              --cache-dir "$SPIRITSAFE_ENTITIES_PATH" \
              --output "$SPIRITSAFE_LOGS_PATH/last_run_summary.json"
          else
            gkc mash cache-wikibase-revisions \
              --cache-dir "$SPIRITSAFE_ENTITIES_PATH" \
              --output "$SPIRITSAFE_LOGS_PATH/last_run_summary.json"
          fi

      - name: Export JSON profiles from refreshed cache
        run: |
          mkdir -p "$SPIRITSAFE_PROFILES_PATH"
          gkc --json profile export-json \
            --cache-entities-dir "$SPIRITSAFE_ENTITIES_PATH" \
            --summary-output "$SPIRITSAFE_LOGS_PATH/last_run_summary.json" \
            --output "$SPIRITSAFE_PROFILES_PATH"

      - name: Build cache manifest and entity index
        run: |
          mkdir -p "$(dirname "$SPIRITSAFE_MANIFEST_PATH")" "$(dirname "$SPIRITSAFE_ENTITY_INDEX_PATH")"
          gkc --json spiritsafe manifest build --source local --local-root .

      - name: Write run summary
        if: always()
        run: |
          if [ -f "$SPIRITSAFE_LOGS_PATH/last_run_summary.json" ]; then
            python3 -c 'import json, os, pathlib; log_path = pathlib.Path(os.environ["SPIRITSAFE_LOGS_PATH"]) / "last_run_summary.json"; data = json.loads(log_path.read_text()); meta = data.get("metadata", {}); summ = data.get("summary", {}); lines = ["## Cache and Build Profiles Run Summary", "", "| Field | Value |", "| --- | --- |", "| API URL | `{}` |".format(meta.get("api_url", "")), "| Since | `{}` |".format(meta.get("since", "")), "| Next since | `{}` |".format(meta.get("next_since", "")), "| Changed | `{}` |".format(summ.get("changed_count", 0)), "| Refreshed | `{}` |".format(summ.get("refreshed_count", 0)), "| Deleted | `{}` |".format(summ.get("deleted_count", 0)), "| Ignored | `{}` |".format(summ.get("ignored_count", 0))]; summary_path = pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"]); existing = summary_path.read_text() if summary_path.exists() else ""; summary_path.write_text(existing + "\n".join(lines) + "\n")'
          fi

      - name: Remove legacy generated artifacts
        run: |
          rm -rf cache/entities cache/refresh
          rm -f cache/manifest.json cache/entity_index.json
          find profiles -maxdepth 1 -type f -name '*.json' -delete || true

      - name: Commit and push cache and profile updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -- "$SPIRITSAFE_ENTITIES_PATH" "$SPIRITSAFE_LOGS_PATH" "$SPIRITSAFE_PROFILES_PATH" "$SPIRITSAFE_MANIFEST_PATH" "$SPIRITSAFE_ENTITY_INDEX_PATH" cache/entities cache/refresh cache/manifest.json cache/entity_index.json profiles
          if git diff --cached --quiet; then
            echo "No cache, profile, manifest, or entity index changes to commit"
          else
            git commit -m "chore: refresh Wikibase cache and export profiles [skip ci]"
            git push origin "HEAD:${{ inputs.target_ref }}"
          fi
