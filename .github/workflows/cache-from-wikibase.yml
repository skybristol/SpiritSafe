name: Cache from Wikibase

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or tag to refresh and commit into
        required: false
        type: string
        default: main
      api_url:
        description: Optional Wikibase API URL override
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  refresh-cache:
    name: Cache from Wikibase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SpiritSafe target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gkc CLI
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/skybristol/gkc.git@main"

      - name: Refresh entity cache from recentchanges
        env:
          INPUT_API_URL: ${{ inputs.api_url }}
        run: |
          mkdir -p cache/refresh
          if [ -n "$INPUT_API_URL" ]; then
            gkc mash cache-wikibase-revisions \
              --api-url "$INPUT_API_URL" \
              --cache-dir cache/entities \
              --ignore-id Q1 \
              --ignore-id P1 \
              --ignore-id P2 \
              --output cache/refresh/last_run_summary.json
          else
            gkc mash cache-wikibase-revisions \
              --cache-dir cache/entities \
              --ignore-id Q1 \
              --ignore-id P1 \
              --ignore-id P2 \
              --output cache/refresh/last_run_summary.json
          fi

      - name: Commit and push cache updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/entities cache/refresh/last_run_summary.json
          if git diff --cached --quiet; then
            echo "No cache changes to commit"
          else
            git commit -m "chore: refresh Wikibase cache [skip ci]"
            git push origin "HEAD:${{ inputs.target_ref }}"
          fi
