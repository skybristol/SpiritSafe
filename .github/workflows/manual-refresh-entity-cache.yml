name: Manual Refresh Entity Cache

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or tag to refresh and commit into
        required: false
        type: string
        default: main
      api_url:
        description: Optional Wikibase API URL override
        required: false
        type: string
        default: ""
      sparql_endpoint:
        description: Optional SPARQL endpoint URL override
        required: false
        type: string
        default: ""
      refresh_mode:
        description: Cache refresh mode
        required: true
        type: choice
        options:
          - full
          - incremental
        default: full

permissions:
  contents: write

jobs:
  refresh-cache:
    name: Refresh Entity Cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SpiritSafe target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gkc CLI
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/skybristol/gkc.git@main"

      - name: Run cache refresh
        env:
          INPUT_API_URL: ${{ inputs.api_url }}
          INPUT_SPARQL_ENDPOINT: ${{ inputs.sparql_endpoint }}
          INPUT_REFRESH_MODE: ${{ inputs.refresh_mode }}
        run: |
          mkdir -p cache/refresh

          if [ "$INPUT_REFRESH_MODE" = "full" ]; then
            cmd=(
              gkc wikibase cache-builder
              --cache-dir cache/entities
              --output cache/refresh/last_run_summary.json
            )

            if [ -n "$INPUT_API_URL" ]; then
              cmd+=(--api-url "$INPUT_API_URL")
            fi
            if [ -n "$INPUT_SPARQL_ENDPOINT" ]; then
              cmd+=(--sparql-endpoint "$INPUT_SPARQL_ENDPOINT")
            fi

            "${cmd[@]}"
          else
            cmd=(
              gkc wikibase check-for-revisions
              --cache-dir cache/entities
              --ignore-id Q1
              --ignore-id P1
              --ignore-id P2
              --output cache/refresh/last_run_summary.json
            )

            if [ -n "$INPUT_API_URL" ]; then
              cmd+=(--api-url "$INPUT_API_URL")
            fi

            "${cmd[@]}"
          fi

      - name: Commit and push cache updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/entities cache/refresh/last_run_summary.json
          if git diff --cached --quiet; then
            echo "No cache changes to commit"
          else
            git commit -m "chore: refresh entity cache from recentchanges [skip ci]"
            git push origin "HEAD:${{ inputs.target_ref }}"
          fi
