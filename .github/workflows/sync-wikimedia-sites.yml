name: Sync Wikimedia Sites

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or tag to sync and commit into
        required: false
        type: string
        default: ""
      source_url:
        description: Optional sitematrix API URL override
        required: false
        type: string
        default: ""
      timeout:
        description: HTTP timeout in seconds
        required: false
        type: string
        default: "30"
      user_agent:
        description: Optional User-Agent override
        required: false
        type: string
        default: ""
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

jobs:
  sync-wikimedia-sites:
    name: Sync Wikimedia Sites Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SpiritSafe target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gkc CLI
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          pip install "git+https://github.com/skybristol/gkc.git@main"

      - name: Resolve SpiritSafe layout paths
        run: python .github/scripts/load_spiritsafe_layout.py >> "$GITHUB_ENV"

      - name: Sync Wikimedia sites artifact
        env:
          INPUT_SOURCE_URL: ${{ inputs.source_url }}
          INPUT_TIMEOUT: ${{ inputs.timeout || '30' }}
          INPUT_USER_AGENT: ${{ inputs.user_agent }}
        run: |
          mkdir -p "$(dirname "$SPIRITSAFE_WIKIMEDIA_SITES_PATH")"
          ARGS=(
            --source local
            --local-root .
            --timeout "$INPUT_TIMEOUT"
          )

          if [ -n "$INPUT_SOURCE_URL" ]; then
            ARGS+=(--source-url "$INPUT_SOURCE_URL")
          fi

          if [ -n "$INPUT_USER_AGENT" ]; then
            ARGS+=(--user-agent "$INPUT_USER_AGENT")
          fi

          gkc --json spiritsafe sitelinks sync-wikimedia-sites "${ARGS[@]}"

      - name: Remove legacy partner artifact path
        run: rm -f cache/config/wikimedia_sites.json

      - name: Commit and push artifact updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -- .
          if git diff --cached --quiet; then
            echo "No Wikimedia sites artifact changes to commit"
          else
            git commit -m "chore: sync wikimedia sites artifact [skip ci]"
            git push origin "HEAD:${{ inputs.target_ref || github.ref_name }}"
          fi
