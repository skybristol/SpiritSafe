name: Hydrate SPARQL Caches

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  push:
    branches:
      - main
    paths:
      - 'profiles/**/queries/*.sparql'
      - 'queries/*.sparql'

jobs:
  hydrate:
    name: Execute SPARQL Queries and Update Caches
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml
      
      - name: Create cache directories
        run: |
          mkdir -p cache/profiles
          mkdir -p cache/queries
      
      - name: Execute SPARQL queries
        id: execute_queries
        run: |
          python - <<'EOF'
          import json
          import re
          import time
          from pathlib import Path
          from urllib.parse import urlencode
          from urllib.request import urlopen, Request
          from urllib.error import URLError, HTTPError
          
          WIKIDATA_ENDPOINT = "https://query.wikidata.org/sparql"
          USER_AGENT = "SpiritSafe-Cache-Hydration/1.0 (https://github.com/skybristol/SpiritSafe)"
          
          def execute_sparql(query, params=None):
              """Execute a SPARQL query against Wikidata"""
              if params:
                  for key, value in params.items():
                      query = query.replace(f'{{{{{key}}}}}', str(value))
              
              headers = {
                  'User-Agent': USER_AGENT,
                  'Accept': 'application/json'
              }
              
              data = urlencode({'query': query}).encode('utf-8')
              request = Request(WIKIDATA_ENDPOINT, data=data, headers=headers)
              
              try:
                  with urlopen(request, timeout=30) as response:
                      result = json.loads(response.read().decode('utf-8'))
                      return result
              except (URLError, HTTPError) as e:
                  print(f"  ⚠️  Query failed: {e}")
                  return None
          
          def process_query_file(sparql_file, output_file):
              """Process a SPARQL file and cache results"""
              print(f"Processing {sparql_file}...")
              
              # Read query file
              with open(sparql_file, 'r') as f:
                  content = f.read()
              
              # Extract parameters from comments
              params = {}
              for line in content.split('\n'):
                  if line.strip().startswith('#') and '{{' in line:
                      match = re.search(r'{{\s*(\w+)\s*}}.*default\s+(\S+)', line)
                      if match:
                          param_name, default_value = match.groups()
                          params[param_name] = default_value
              
              # Execute query
              result = execute_sparql(content, params)
              
              if result:
                  # Save to cache
                  output_file.parent.mkdir(parents=True, exist_ok=True)
                  with open(output_file, 'w') as f:
                      json.dump(result, f, indent=2)
                  print(f"  ✓ Cached to {output_file}")
                  return True
              else:
                  print(f"  ✗ Failed to cache")
                  return False
          
          # Process profile queries
          success_count = 0
          fail_count = 0
          
          for sparql_file in Path('profiles').rglob('*.sparql'):
              # Determine cache path
              relative = sparql_file.relative_to('profiles')
              cache_file = Path('cache/profiles') / relative.parent / f"{sparql_file.stem}.json"
              
              if process_query_file(sparql_file, cache_file):
                  success_count += 1
              else:
                  fail_count += 1
              
              # Rate limiting
              time.sleep(1)
          
          # Process shared queries
          for sparql_file in Path('queries').rglob('*.sparql'):
              cache_file = Path('cache/queries') / f"{sparql_file.stem}.json"
              
              if process_query_file(sparql_file, cache_file):
                  success_count += 1
              else:
                  fail_count += 1
              
              # Rate limiting
              time.sleep(1)
          
          print(f"\n{'='*60}")
          print(f"Hydration complete: {success_count} successful, {fail_count} failed")
          print(f"{'='*60}")
          
          # Set output for summary
          with open('hydration_summary.txt', 'w') as f:
              f.write(f"{success_count} queries executed successfully\n")
              f.write(f"{fail_count} queries failed\n")
          
          if fail_count > 0:
              exit(1)
          EOF
      
      - name: Commit cache updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cache/
          
          if git diff --staged --quiet; then
            echo "No cache changes to commit"
          else
            git commit -m "chore: update SPARQL query caches [automated]"
            git push
            echo "Cache updates committed"
          fi
      
      - name: Upload hydration summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hydration-summary
          path: hydration_summary.txt
          retention-days: 30
