name: Build Manifest

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or tag to build and commit manifest into
        required: false
        type: string
        default: main

permissions:
  contents: write

jobs:
  build-manifest:
    name: Build Manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SpiritSafe target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gkc CLI
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/skybristol/gkc.git@main"

      - name: Build cache manifest
        run: |
          mkdir -p cache
          gkc --json spiritsafe manifest build --source local --local-root .

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/manifest.json
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "chore: rebuild cache manifest [skip ci]"
            git push origin "HEAD:${{ inputs.target_ref }}"
          fi
