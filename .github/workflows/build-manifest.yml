name: Build Manifest

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or tag to build and commit manifest into
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build-manifest:
    name: Build Manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SpiritSafe target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gkc CLI
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          pip install "git+https://github.com/skybristol/gkc.git@main"

      - name: Resolve SpiritSafe layout paths
        run: python .github/scripts/load_spiritsafe_layout.py >> "$GITHUB_ENV"

      - name: Build cache manifest and entity index
        run: |
          mkdir -p "$(dirname "$SPIRITSAFE_MANIFEST_PATH")" "$(dirname "$SPIRITSAFE_ENTITY_INDEX_PATH")"
          gkc --json spiritsafe manifest build --source local --local-root .

      - name: Remove legacy manifest outputs
        run: |
          rm -rf cache profiles queries

      - name: Commit and push manifest and entity index update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -- .
          if git diff --cached --quiet; then
            echo "No manifest or entity index changes to commit"
          else
            git commit -m "chore: rebuild cache manifest and entity index [skip ci]"
            git push origin "HEAD:${{ inputs.target_ref || github.ref_name }}"
          fi
