name: SpiritSafe CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'profiles/**'
      - 'queries/**'
      - '.github/workflows/validate-profile.yml'
  push:
    branches:
      - main
    paths:
      - 'profiles/**'
      - 'queries/**'
      - '.github/workflows/validate-profile.yml'

jobs:
  validate-registry-shape:
    name: Validate Registry Shape
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate YAML syntax
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path
          import yaml

          errors = []
          for profile_file in Path("profiles").rglob("profile.yaml"):
            try:
              with open(profile_file, "r", encoding="utf-8") as f:
                yaml.safe_load(f)
              print(f"OK {profile_file}")
            except yaml.YAMLError as e:
              errors.append(f"{profile_file}: {e}")
              print(f"ERROR {profile_file}: {e}")

          if errors:
            print(f"YAML validation failed for {len(errors)} file(s)")
            sys.exit(1)

          print("YAML validation passed")
          PY

      - name: Check profile package shape
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          errors = []
          profiles_root = Path("profiles")
          if profiles_root.exists():
            for profile_dir in profiles_root.iterdir():
              if profile_dir.is_dir():
                required_files = ["profile.yaml", "metadata.yaml", "README.md", "CHANGELOG.md"]
                for req_file in required_files:
                  file_path = profile_dir / req_file
                  if not file_path.exists():
                    errors.append(f"{profile_dir.name} missing {req_file}")
                    print(f"ERROR {profile_dir.name}: Missing {req_file}")
                  else:
                    print(f"OK {profile_dir.name}/{req_file}")

          if errors:
            print(f"Profile package shape check failed for {len(errors)} issue(s)")
            sys.exit(1)

          print("Profile package shape check passed")
          PY

      - name: Validate SPARQL query syntax
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          errors = []
          for root in [Path("profiles"), Path("queries")]:
            for sparql_file in root.rglob("*.sparql"):
              try:
                with open(sparql_file, "r", encoding="utf-8") as f:
                  content = f.read()
                upper = content.upper()
                if "SELECT" not in upper and "CONSTRUCT" not in upper:
                  errors.append(f"{sparql_file}: missing SELECT/CONSTRUCT")
                  print(f"ERROR {sparql_file}: missing SELECT/CONSTRUCT")
                else:
                  print(f"OK {sparql_file}")
              except Exception as e:
                errors.append(f"{sparql_file}: {e}")
                print(f"ERROR {sparql_file}: {e}")

          if errors:
            print(f"SPARQL validation failed for {len(errors)} file(s)")
            sys.exit(1)

          print("SPARQL validation passed")
          PY

      - name: Validate JSON profile schema sanity
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          profile_files = sorted(Path("profiles").glob("*.json"))
          if not profile_files:
            print("No JSON profiles found under profiles/*.json; skipping sanity check")
            sys.exit(0)

          has_new_model = False
          errors = []

          for profile_file in profile_files:
            try:
              data = json.loads(profile_file.read_text(encoding="utf-8"))
            except Exception as exc:
              errors.append(f"{profile_file}: invalid JSON: {exc}")
              continue

            if "id" in data or "name_identifier" in data:
              has_new_model = True

            # Always enforce baseline JSON profile shape.
            for required_key in ("statements", "metadata"):
              if required_key not in data:
                errors.append(f"{profile_file}: missing top-level key '{required_key}'")

          if not has_new_model:
            print(
              "JSON sanity: legacy profile shape detected (no top-level id/name_identifier yet). "
              "Baseline checks passed; strict new-model checks will activate automatically once regenerated profiles are committed."
            )
          else:
            print("JSON sanity: new-model profile fields detected, enforcing strict checks")
            for profile_file in profile_files:
              data = json.loads(profile_file.read_text(encoding="utf-8"))

              profile_id = data.get("id")
              if not isinstance(profile_id, str) or not profile_id.startswith("http"):
                errors.append(f"{profile_file}: top-level id must be an HTTP URI")

              profile_name_identifier = data.get("name_identifier")
              if not isinstance(profile_name_identifier, str) or not profile_name_identifier.strip():
                errors.append(f"{profile_file}: missing non-empty top-level name_identifier")

              statements = data.get("statements", [])
              if not isinstance(statements, list):
                errors.append(f"{profile_file}: statements must be a list")
                continue

              for idx, statement in enumerate(statements):
                if not isinstance(statement, dict):
                  errors.append(f"{profile_file}: statements[{idx}] must be an object")
                  continue
                statement_id = statement.get("id")
                if not isinstance(statement_id, str) or not statement_id.startswith("http"):
                  errors.append(
                    f"{profile_file}: statements[{idx}] id must be an HTTP URI"
                  )
                statement_name_identifier = statement.get("name_identifier")
                if not isinstance(statement_name_identifier, str) or not statement_name_identifier.strip():
                  errors.append(
                    f"{profile_file}: statements[{idx}] missing non-empty name_identifier"
                  )

          if errors:
            for error in errors:
              print(f"ERROR {error}")
            print(f"JSON profile sanity check failed with {len(errors)} issue(s)")
            sys.exit(1)

          print("JSON profile sanity check passed")
          PY

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-registry-shape]
    if: always()

    steps:
      - name: Check validation results
        run: |
          if [ "${{ needs.validate-registry-shape.result }}" != "success" ]; then
            echo "Validation failed"
            exit 1
          fi
          echo "All validations passed"
