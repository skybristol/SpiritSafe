name: Validate Profile

on:
  pull_request:
    paths:
      - 'profiles/**'
      - 'queries/**'
      - '.github/workflows/validate-profile.yml'
  push:
    branches:
      - main
    paths:
      - 'profiles/**'
      - 'queries/**'

jobs:
  validate-yaml:
    name: Validate Profile YAML
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema
      
      - name: Validate YAML syntax
        run: |
          echo "Validating YAML syntax for all profiles..."
          python -c "
          import yaml
          import sys
          from pathlib import Path
          
          errors = []
          for profile_file in Path('profiles').rglob('profile.yaml'):
              try:
                  with open(profile_file, 'r') as f:
                      yaml.safe_load(f)
                  print(f'✓ {profile_file}')
              except yaml.YAMLError as e:
                  errors.append(f'{profile_file}: {e}')
                  print(f'✗ {profile_file}: {e}')
          
          if errors:
              print(f'\n{len(errors)} validation error(s) found')
              sys.exit(1)
          else:
              print(f'\nAll profiles validated successfully')
          "
      
      - name: Validate metadata files
        run: |
          echo "Validating metadata.yaml for all profiles..."
          python -c "
          import yaml
          import sys
          from pathlib import Path
          
          required_fields = ['name', 'description', 'version', 'status', 'published_date', 'authors', 'maintainers']
          errors = []
          
          for metadata_file in Path('profiles').rglob('metadata.yaml'):
              try:
                  with open(metadata_file, 'r') as f:
                      data = yaml.safe_load(f)
                  
                  missing = [field for field in required_fields if field not in data]
                  if missing:
                      errors.append(f'{metadata_file}: Missing required fields: {missing}')
                      print(f'✗ {metadata_file}: Missing {missing}')
                  else:
                      print(f'✓ {metadata_file}')
              except Exception as e:
                  errors.append(f'{metadata_file}: {e}')
                  print(f'✗ {metadata_file}: {e}')
          
          if errors:
              print(f'\n{len(errors)} metadata validation error(s) found')
              sys.exit(1)
          else:
              print(f'\nAll metadata files validated successfully')
          "
      
      - name: Check for required documentation
        run: |
          echo "Checking for required documentation files..."
          python -c "
          import sys
          from pathlib import Path
          
          errors = []
          for profile_dir in Path('profiles').iterdir():
              if profile_dir.is_dir():
                  required_files = ['profile.yaml', 'metadata.yaml', 'README.md', 'CHANGELOG.md']
                  for req_file in required_files:
                      file_path = profile_dir / req_file
                      if not file_path.exists():
                          errors.append(f'{profile_dir.name} missing {req_file}')
                          print(f'✗ {profile_dir.name}: Missing {req_file}')
                      else:
                          print(f'✓ {profile_dir.name}/{req_file}')
          
          if errors:
              print(f'\n{len(errors)} documentation error(s) found')
              sys.exit(1)
          else:
              print(f'\nAll required documentation present')
          "
      
      - name: Validate SPARQL query syntax
        run: |
          echo "Validating SPARQL query files..."
          # Basic validation - check that files are readable and contain SELECT
          python -c "
          import sys
          from pathlib import Path
          
          errors = []
          for sparql_file in Path('profiles').rglob('*.sparql'):
              try:
                  with open(sparql_file, 'r') as f:
                      content = f.read()
                  if 'SELECT' not in content.upper() and 'CONSTRUCT' not in content.upper():
                      errors.append(f'{sparql_file}: No SELECT or CONSTRUCT clause found')
                      print(f'✗ {sparql_file}: Invalid SPARQL')
                  else:
                      print(f'✓ {sparql_file}')
              except Exception as e:
                  errors.append(f'{sparql_file}: {e}')
                  print(f'✗ {sparql_file}: {e}')
          
          # Check shared queries too
          for sparql_file in Path('queries').rglob('*.sparql'):
              try:
                  with open(sparql_file, 'r') as f:
                      content = f.read()
                  if 'SELECT' not in content.upper() and 'CONSTRUCT' not in content.upper():
                      errors.append(f'{sparql_file}: No SELECT or CONSTRUCT clause found')
                      print(f'✗ {sparql_file}: Invalid SPARQL')
                  else:
                      print(f'✓ {sparql_file}')
              except Exception as e:
                  errors.append(f'{sparql_file}: {e}')
                  print(f'✗ {sparql_file}: {e}')
          
          if errors:
              print(f'\n{len(errors)} SPARQL validation error(s) found')
              sys.exit(1)
          else:
              print(f'\nAll SPARQL queries validated successfully')
          "

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-yaml]
    if: always()
    
    steps:
      - name: Check validation results
        run: |
          if [ "${{ needs.validate-yaml.result }}" != "success" ]; then
            echo "❌ Profile validation failed"
            exit 1
          else
            echo "✅ All validations passed"
          fi
