name: Hydrate Value Lists

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or tag to hydrate and commit into
        required: false
        type: string
        default: ""
      api_url:
        description: Optional Wikibase API URL override
        required: false
        type: string
        default: ""
      sparql_endpoint:
        description: Optional SPARQL endpoint URL override
        required: false
        type: string
        default: "https://query.wikidata.org/sparql"
      page_size:
        description: SPARQL page size used for hydration
        required: false
        type: string
        default: "1000"
      value_list_qid:
        description: Optional QID or comma-delimited list of QIDs to hydrate (e.g. Q56 or Q56,Q57). Leave blank to hydrate all value lists.
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  hydrate-value-lists:
    name: Hydrate Value Lists
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SpiritSafe target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gkc CLI
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          pip install "git+https://github.com/skybristol/gkc.git@main"

      - name: Resolve SpiritSafe layout paths
        run: python .github/scripts/load_spiritsafe_layout.py >> "$GITHUB_ENV"

      - name: Hydrate value-list queries and cache artifacts
        env:
          INPUT_API_URL: ${{ inputs.api_url }}
          INPUT_SPARQL_ENDPOINT: ${{ inputs.sparql_endpoint }}
          INPUT_PAGE_SIZE: ${{ inputs.page_size }}
          INPUT_VALUE_LIST_QID: ${{ inputs.value_list_qid }}
        run: |
          mkdir -p "$SPIRITSAFE_VALUE_LIST_QUERIES_PATH" "$SPIRITSAFE_VALUE_LIST_CACHE_PATH"

          ARGS=(
            --source local
            --local-root .
            --page-size "$INPUT_PAGE_SIZE"
          )

          if [ -n "$INPUT_API_URL" ]; then
            ARGS+=(--api-url "$INPUT_API_URL")
          fi

          ARGS+=(--endpoint "$INPUT_SPARQL_ENDPOINT")

          if [ -n "$INPUT_VALUE_LIST_QID" ]; then
            IFS=',' read -r -a VALUE_LIST_IDS <<< "$INPUT_VALUE_LIST_QID"
            for raw_id in "${VALUE_LIST_IDS[@]}"; do
              value_list_id="$(printf '%s' "$raw_id" | xargs)"
              if [ -n "$value_list_id" ]; then
                ARGS+=(--value-list-id "$value_list_id")
              fi
            done
          fi

          gkc --json profile value-lists hydrate "${ARGS[@]}"

      - name: Write run summary
        if: always()
        run: |
          if [ -d "$SPIRITSAFE_VALUE_LIST_QUERIES_PATH" ] || [ -d "$SPIRITSAFE_VALUE_LIST_CACHE_PATH" ]; then
            python3 -c 'import os, pathlib; query_dir = pathlib.Path(os.environ["SPIRITSAFE_VALUE_LIST_QUERIES_PATH"]); cache_dir = pathlib.Path(os.environ["SPIRITSAFE_VALUE_LIST_CACHE_PATH"]); query_count = len(list(query_dir.glob("*.sparql"))) if query_dir.exists() else 0; cache_count = len(list(cache_dir.glob("*.json"))) if cache_dir.exists() else 0; lines = ["## Hydrate Value Lists Run Summary", "", "| Field | Value |", "| --- | --- |", "| API URL override | `{}` |".format(os.environ.get("INPUT_API_URL", "")), "| SPARQL endpoint override | `{}` |".format(os.environ.get("INPUT_SPARQL_ENDPOINT", "")), "| Page size | `{}` |".format(os.environ.get("INPUT_PAGE_SIZE", "")), "| Value list QID | `{}` |".format(os.environ.get("INPUT_VALUE_LIST_QID", "")), "| Query files | `{}` |".format(query_count), "| Cache files | `{}` |".format(cache_count)]; summary_path = pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"]); existing = summary_path.read_text() if summary_path.exists() else ""; summary_path.write_text(existing + "\n".join(lines) + "\n")'
          fi

      - name: Remove legacy value-list artifacts
        run: |
          rm -rf cache profiles queries

      - name: Commit and push value-list query/cache updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -- .
          if git diff --cached --quiet; then
            echo "No value-list query or cache changes to commit"
          else
            git commit -m "chore: hydrate value-list queries and caches [skip ci]"
            git push origin "HEAD:${{ inputs.target_ref || github.ref_name }}"
          fi
