name: Build Semantic Anchors

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or tag to build and commit semantic anchors into
        required: false
        type: string
        default: ""
      output_path:
        description: Output path for the semantic anchor artifact inside SpiritSafe
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build-semantic-anchors:
    name: Build Semantic Anchors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SpiritSafe target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gkc CLI
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          pip install "git+https://github.com/skybristol/gkc.git@main"

      - name: Resolve SpiritSafe layout paths
        run: python .github/scripts/load_spiritsafe_layout.py >> "$GITHUB_ENV"

      - name: Build semantic anchor artifact
        env:
          INPUT_OUTPUT_PATH: ${{ inputs.output_path }}
        run: |
          OUTPUT_PATH="${INPUT_OUTPUT_PATH:-$SPIRITSAFE_SEMANTIC_ANCHORS_PATH}"
          mkdir -p "$(dirname "$OUTPUT_PATH")"
          gkc --json spiritsafe semantic-anchors build \
            --source local \
            --local-root . \
            --output "$OUTPUT_PATH"

      - name: Commit and push semantic anchor update
        env:
          INPUT_OUTPUT_PATH: ${{ inputs.output_path }}
        run: |
          OUTPUT_PATH="${INPUT_OUTPUT_PATH:-$SPIRITSAFE_SEMANTIC_ANCHORS_PATH}"
          rm -rf cache profiles queries
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -- .
          if git diff --cached --quiet; then
            echo "No semantic anchor changes to commit"
          else
            git commit -m "chore: rebuild semantic anchors [skip ci]"
            git push origin "HEAD:${{ inputs.target_ref || github.ref_name }}"
          fi