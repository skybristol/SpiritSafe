name: Build Semantic Anchors

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or tag to build and commit semantic anchors into
        required: false
        type: string
        default: main

permissions:
  contents: write

jobs:
  build-semantic-anchors:
    name: Build Semantic Anchors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SpiritSafe target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gkc CLI
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/skybristol/gkc.git@main"

      - name: Build semantic anchor artifact
        run: |
          mkdir -p cache/config
          gkc --json spiritsafe semantic-anchors build --source local --local-root .

      - name: Commit and push semantic anchor update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/config/semantic_anchors.json
          if git diff --cached --quiet; then
            echo "No semantic anchor changes to commit"
          else
            git commit -m "chore: rebuild semantic anchors [skip ci]"
            git push origin "HEAD:${{ inputs.target_ref }}"
          fi