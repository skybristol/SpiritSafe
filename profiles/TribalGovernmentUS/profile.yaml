name: Federally Recognized Tribe
description: >
  Canonical form for representing a federally recognized Native American tribe
  in the United States, based loosely on EntitySchema E502.

# Entity labels (multilingual)
labels:
  en:
    label: Label
    input_prompt: >
      primary name that the tribe uses to refer to itself in English
    required: true
    guidance: >
      Use the name that the tribe uses in referring to itself as the primary label where possible.
      Rely on official tribal government websites.
      Prefer the tribe's self-designation over external government names.

# Entity descriptions (multilingual)
descriptions:
  en:
    label: Description
    input_prompt: >
      short, distinctive description to disambiguate this tribe from others
    required: true
    guidance: >
      Format: "federally recognized Native American tribe based in [region/state]"
      Example: "federally recognized Native American tribe based in Oklahoma"
      Keep concise (under 250 characters) and informative.

# Entity aliases (multilingual alternative names)
aliases:
  en:
    label: Aliases
    input_prompt: >
      alternative names by which this tribe is known or has been referred to
    required: false
    guidance: >
      Include an alias for the official name of the tribe as referred to by the U.S. Government
      (e.g., from the Bureau of Indian Affairs list).

# Entity sitelinks (Wikipedia and other wiki language versions)
sitelinks:
  required: false
  validation_policy: allow_existing_nonconforming
  guidance: >
    Sitelinks connect this item to Wikipedia articles and other Wikimedia projects in different languages.
    Each language/project combination can only appear on ONE Wikidata item - check for conflicts
    before adding sitelinks. Validation at profile level can check format, but uniqueness
    constraint will only be caught when writing to Wikidata.
  
  languages:
    en:
      project: wikipedia
      description: English Wikipedia article
      input_prompt: title of the English Wikipedia article about this tribe
      required: false
      guidance: >
        Article title should match the tribe name or established Wikipedia conventions.
      
# Reusable reference patterns
standard_reference: &standard_reference
  min_count: 1
  input_prompt: Add at least one source reference for this statement.
  validation_policy: allow_existing_nonconforming
  allowed:
    - id: stated_in
      wikidata_property: P248
      type: item
      label: Stated in
      input_prompt: Enter the QID of the source publication or source dataset.
      description: Reference to source document or database
    - id: reference_url
      wikidata_property: P854
      type: url
      label: Reference URL
      input_prompt: Enter the direct URL to the source used for this statement.
      description: Direct URL to source

statements:

  - id: instance_of
    label: Instance of
    input_prompt: the primary classification for the tribe (fixed to "federally recognized Native American tribe in the United States" for this profile)
    wikidata_property: P31
    type: statement
    max_count: null   # allow multiple P31 values on existing items
    validation_policy: allow_existing_nonconforming
    
    behavior:
      value: fixed           # Value locked to Q7840353 in all contexts
      references: editable    # References manually provided from SPARQL list

    value:
      type: item
      fixed: Q7840353
      label: federally recognized Native American tribe in the United States

    references:
      min_count: 1
      input_prompt: Add the Federal Register source for this classification statement
      validation_policy: allow_existing_nonconforming

      allowed:
        id: stated_in
        wikidata_property: P248
        type: item
        label: Stated in

        allowed_items:
          source: sparql
          query_ref: queries/bia_federal_register_issues.sparql
          query_params:
            federal_register_class_qid: Q121840925
            author_qid: Q1010563
            lang: en
          refresh: manual   # or "daily", "weekly", "on_release"
          fallback_items:
            - id: Q138391266  
              label: Indian Entities Recognized by and Eligible to Receive Services from the United States Bureau of Indian Affairs (January 30, 2026)

  - id: official_website
    label: Official website
    input_prompt: official website for the tribal government
    wikidata_property: P856
    type: statement
    max_count: 1
    validation_policy: allow_existing_nonconforming
    
    behavior:
      value: editable
      references: auto_derive  # Auto-generate P854 from P856

    value:
      type: url

    qualifiers:
      - id: language_of_work
        label: Language of work or name
        input_prompt: specify the language used on the website
        wikidata_property: P407

        value:
          type: item
          fixed: Q1860
          label: English

    references:
      min_count: 1
      input_prompt: Add a reference URL for the website statement.
      validation_policy: allow_existing_nonconforming

      target:
        id: reference_url
        wikidata_property: P854
        type: url
        label: Reference URL
        value_source: statement_value  # use P856 URL as reference

  - id: member_count
    label: Member count
    input_prompt: member count statement when a reliable source is available
    wikidata_property: P2124
    type: statement

    value:
      type: quantity
      constraints:
        - type: integer_only
          description: Must be an integer (whole number)

    qualifiers:
      - id: point_in_time
        label: Point in time
        input_prompt: date the reported member count applies to
        wikidata_property: P585
        guidance: >
          The date for the member count should be included as a qualifier to provide temporal context.
          Enter the date in YYYY, YYYY-MM, or YYYY-MM-DD format.

        value:
          type: time

    references: *standard_reference

  - id: native_name
    label: Native name
    input_prompt: native label in the language used by the tribe
    wikidata_property: P1705
    type: statement
    max_count: null   # allow multiple native names in different languages
    validation_policy: allow_existing_nonconforming

    value:
      type: monolingualtext
      constraints:
        - type: language_required
          description: Must specify a language code
        - type: valid_language_code
          description: Must use a valid Wikimedia language code

    qualifiers:
      - id: language_of_work
        label: Language of work or name
        input_prompt: language corresponding to this native name
        wikidata_property: P407
        max_count: 1

        value:
          type: item
          # Language choice list - provides both language codes (for monolingualtext)
          # and QIDs (for this qualifier when language code is "mis" or needs disambiguation)
          allowed_items:
            source: sparql
            query_ref: queries/wikidata_language_items_en.sparql
            query_params:
              language_class_qid: Q34770
              iso_property_pid: P424
              lang: en
            refresh: weekly
            fallback_items:
              - id: Q33298
                label: Navajo
              - id: Q28026
                label: Cherokee
              - id: Q36727
                label: Ojibwe
              - id: Q13310
                label: Dakota
              - id: Q13389
                label: uncoded languages (mis)

    references: *standard_reference

  - id: headquarters_location
    label: Headquarters location
    input_prompt: headquarters location for the tribal government
    wikidata_property: P159
    type: statement
    max_count: 1
    validation_policy: allow_existing_nonconforming

    value:
      type: item

    qualifiers:
      - id: street_address
        label: Street address
        input_prompt: street address for the headquarters location
        wikidata_property: P6375
        max_count: 1

        value:
          type: monolingualtext
          constraints:
            - type: language_required
              description: Must specify a language code

      - id: postal_code
        label: Postal code
        input_prompt: postal code for the headquarters address
        wikidata_property: P281
        max_count: 1

        value:
          type: string

      - id: coordinate_location
        label: Coordinate location
        input_prompt: latitude and longitude for the headquarters location
        wikidata_property: P625
        max_count: 1

        value:
          type: globecoordinate
          constraints:
            - type: valid_coordinates
            - type: precision
              min_precision: 0.0001  # ~11m precision (building-level)
              max_precision: 0.01    # ~1km precision (city-level)
            - type: globe
              default: http://www.wikidata.org/entity/Q2

    references: *standard_reference

  - id: inception
    label: Inception
    input_prompt: inception date for formal recognition or establishment
    wikidata_property: P571
    type: statement
    max_count: 1
    validation_policy: allow_existing_nonconforming

    value:
      type: time
      constraints:
        - type: precision
          description: Time precision derived from input format
          allowed_precisions:
            - 9   # year (e.g., "2000" → "+2000-00-00T00:00:00Z")
            - 10  # month (e.g., "2000-01" → "+2000-01-00T00:00:00Z")
            - 11  # day (e.g., "2000-01-15" → "+2000-01-15T00:00:00Z")
          auto_derive: true  # Automatically determine precision from input
        - type: calendar_model
          description: Calendar system used for date interpretation
          default: http://www.wikidata.org/entity/Q1985727  # Gregorian calendar
          allowed_calendars:
            - http://www.wikidata.org/entity/Q1985727  # Gregorian
            - http://www.wikidata.org/entity/Q12138    # Julian (for historical dates)
        - type: format
          description: Expected input formats
          patterns:
            - "YYYY"           # year only → precision 9
            - "YYYY-MM"        # year-month → precision 10
            - "YYYY-MM-DD"     # full date → precision 11

    references: *standard_reference

  - id: osm_relation_id
    label: OpenStreetMap relation ID
    input_prompt: OpenStreetMap relation identifier statement when available
    wikidata_property: P402
    type: statement
    max_count: 1
    validation_policy: allow_existing_nonconforming

    value:
      type: external-id
      constraints:
        - type: format
          description: OpenStreetMap relation IDs are numeric
          pattern: '^\d+$'  # digits only
        - type: formatter_url
          description: Wikidata property formatter URL for validation
          url_pattern: 'http://www.openstreetmap.org/relation/$1'
          validate: true  # Enable URL validation - check that formatted URL is valid
          validation_method: http_head  # Use HTTP HEAD request to validate
        - type: external_system
          description: External system reference
          system: OpenStreetMap
          url_base: 'http://www.openstreetmap.org/relation/'

  - id: flag_image
    label: Flag image
    input_prompt: flag image for valid Wikimedia Commons file
    wikidata_property: P41
    type: statement
    max_count: 1
    validation_policy: allow_existing_nonconforming

    value:
      type: commonsMedia
      constraints:
        - type: file_exists
          description: File must exist on Wikimedia Commons
          validate: true
          validation_method: commons_api  # Check via Commons API
        - type: file_type
          description: Allowed file formats for flags
          allowed_types:
            - 'image/svg+xml'
            - 'image/png'
            - 'image/jpeg'
        - type: wikidata_constraint
          description: Commons file must have wikidata_constraint P6216 (license)
          required_property: P6216  # File license

    references: *standard_reference
  - id: office_held_by_head_of_state
    label: Office held by head of state
    input_prompt: the title of the office held by the head of state/government of this tribe
    wikidata_property: P1906
    type: statement
    entity_profile: OfficeHeldByHeadOfState
    max_count: 1
    validation_policy: allow_existing_nonconforming
    form_policy: target_only
    guidance: >
      This is the office itself (e.g., "Principal Chief of the Cherokee Nation", "President 
      of the Navajo Nation"), not the person currently holding the office. Use the "head of 
      state" (P35) property to specify individuals serving in this role during specific time periods.

    value:
      type: item

    references: *standard_reference
