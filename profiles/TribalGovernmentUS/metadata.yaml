name: Federally Recognized Tribe
description: >
  Canonical form for representing a federally recognized Native American tribe
  in the United States. This profile provides comprehensive support for documenting
  tribal governments with a focus on official nomenclature, federal recognition status,
  government structure, and cultural attributes. Based on Wikidata EntitySchema E502
  with additional properties and enhanced validation.

